<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Mapa świata - OdpalamyCheaterow</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f8f9fa;
            min-height: 100vh;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-link {
            color: #f8f9fa;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: #ff6b6b;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #f8f9fa;
            margin: 3px 0;
            transition: 0.3s;
        }

        .map-container {
            padding-top: 80px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
        }

        .map-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .map-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .control-group {
            flex: 1;
            min-width: 150px;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4ecdc4;
            font-size: 0.85rem;
        }

        .control-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.9rem;
        }

        .btn-map {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-map:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .map-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 600px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .coords-info {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: #ffd93d;
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-menu {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background: #1a1a2e;
                width: 100%;
                text-align: center;
                transition: 0.3s;
                padding: 2rem 0;
            }
            .nav-menu.active { left: 0; }
            .controls-panel { flex-direction: column; }
            .btn-map { width: 100%; }
            .map-wrapper { height: 400px; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 4px solid #4ecdc4;
            z-index: 1002;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><h2>⚔️ OdpalamyCheaterow</h2></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">🏠 Strona Główna</a></li>
                <li><a href="index.html#server" class="nav-link">🖥️ Serwer</a></li>
                <li><a href="index.html#features" class="nav-link">⭐ Funkcje</a></li>
                <li><a href="index.html#rules" class="nav-link">📜 Regulamin</a></li>
                <li><a href="index.html#changelog" class="nav-link">📋 Changelog</a></li>
                <li><a href="maps.html" class="nav-link active">🗺️ Mapa</a></li>
                <li><a href="index.html#discord" class="nav-link">💬 Discord</a></li>
                <li><a href="admin.html" class="nav-link admin-btn">🔧 Admin</a></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="map-container">
        <div class="map-header">
            <h1>🗺️ Mapa Świata Minecraft</h1>
            <p>Wpisz seed swojego serwera i swoje koordynaty, aby zobaczyć mapę</p>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <label>🌍 Seed serwera</label>
                <input type="text" id="seedInput" placeholder="np. -123456789" value="12345">
            </div>
            <div class="control-group">
                <label>📍 Koordynat X</label>
                <input type="number" id="coordX" placeholder="X" value="0">
            </div>
            <div class="control-group">
                <label>📍 Koordynat Z</label>
                <input type="number" id="coordZ" placeholder="Z" value="0">
            </div>
            <button class="btn-map" id="updateMapBtn">🗺️ Pokaż mapę</button>
        </div>

        <div class="map-wrapper">
            <iframe id="chunkbaseFrame" src="https://www.chunkbase.com/apps/map/#seed=12345&x=0&z=0&zoom=5"></iframe>
        </div>

        <div class="coords-info" id="coordsInfo">
            💡 Wpisz seed i swoje koordynaty, kliknij "Pokaż mapę"
        </div>
    </div>

    <script>
        // Nawigacja mobilna
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        if (hamburger && navMenu) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateMap() {
            let seed = document.getElementById('seedInput').value.trim();
            let x = document.getElementById('coordX').value || 0;
            let z = document.getElementById('coordZ').value || 0;
            
            if (!seed) seed = '12345';
            
            const url = `https://www.chunkbase.com/apps/map/#seed=${encodeURIComponent(seed)}&x=${x}&z=${z}&zoom=5`;
            document.getElementById('chunkbaseFrame').src = url;
            
            document.getElementById('coordsInfo').innerHTML = `📍 Seed: ${seed} | Pozycja: X=${x}, Z=${z} | Mapa załadowana!`;
            showToast(`🗺️ Mapa zaktualizowana! Seed: ${seed}, pozycja: X=${x}, Z=${z}`);
        }

        document.getElementById('updateMapBtn').addEventListener('click', updateMap);
        
        document.getElementById('seedInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
        document.getElementById('coordX').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
        document.getElementById('coordZ').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
    </script>
</body>
</html>

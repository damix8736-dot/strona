<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Mapa świata - OdpalamyCheaterow</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f8f9fa;
            min-height: 100vh;
        }

        /* Nawigacja */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-link {
            color: #f8f9fa;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: #ff6b6b;
        }

        .admin-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff9f4a);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #f8f9fa;
            margin: 3px 0;
            transition: 0.3s;
        }

        /* Główna sekcja mapy */
        .map-container {
            padding-top: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Panel sterowania */
        .controls-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-group label {
            color: #4ecdc4;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .control-group input {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 100px;
            text-align: center;
        }

        .control-group input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .btn-map {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .btn-map:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* Ramka mapy */
        .map-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        .map-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsywność */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-menu {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background: #1a1a2e;
                width: 100%;
                text-align: center;
                transition: 0.3s;
                padding: 2rem 0;
                gap: 1rem;
            }
            .nav-menu.active { left: 0; }
            .controls-panel { padding: 0.8rem 1rem; gap: 0.5rem; }
            .control-group { flex-wrap: wrap; justify-content: center; }
            .btn-map { width: 100%; margin-top: 0.3rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>⚔️ OdpalamyCheaterow</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">🏠 Strona Główna</a></li>
                <li><a href="index.html#server" class="nav-link">🖥️ Serwer</a></li>
                <li><a href="index.html#features" class="nav-link">⭐ Funkcje</a></li>
                <li><a href="index.html#rules" class="nav-link">📜 Regulamin</a></li>
                <li><a href="index.html#changelog" class="nav-link">📋 Changelog</a></li>
                <li><a href="maps.html" class="nav-link active">🗺️ Mapa</a></li>
                <li><a href="index.html#discord" class="nav-link">💬 Discord</a></li>
                <li><a href="admin.html" class="nav-link admin-btn">🔧 Admin</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="map-container">
        <div class="controls-panel">
            <div class="control-group">
                <label>🌍 Seed:</label>
                <input type="text" id="seedInput" placeholder="seed" value="12345">
            </div>
            <div class="control-group">
                <label>📍 X:</label>
                <input type="number" id="coordX" placeholder="X" value="0">
            </div>
            <div class="control-group">
                <label>📍 Z:</label>
                <input type="number" id="coordZ" placeholder="Z" value="0">
            </div>
            <button class="btn-map" id="updateMapBtn">🗺️ Przejdź do pozycji</button>
        </div>

        <div class="map-frame">
            <iframe id="chunkbaseFrame" src="https://www.chunkbase.com/apps/map/#seed=12345&x=0&z=0&zoom=4"></iframe>
        </div>
    </div>

    <script>
        // Nawigacja mobilna
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        if (hamburger && navMenu) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        // Zamknij menu po kliknięciu linku
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        function updateMap() {
            let seed = document.getElementById('seedInput').value.trim();
            let x = document.getElementById('coordX').value || 0;
            let z = document.getElementById('coordZ').value || 0;
            
            if (seed === "") seed = "12345";
            
            const url = `https://www.chunkbase.com/apps/map/#seed=${encodeURIComponent(seed)}&x=${x}&z=${z}&zoom=4`;
            document.getElementById('chunkbaseFrame').src = url;
        }

        document.getElementById('updateMapBtn').addEventListener('click', updateMap);
        
        // Enter w polach
        document.getElementById('seedInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
        document.getElementById('coordX').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
        document.getElementById('coordZ').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateMap();
        });
    </script>
</body>
</html>

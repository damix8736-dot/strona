<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>🗺️ Mapa świata - MC Seed View</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Roboto', sans-serif;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }
        input {
            background: rgba(255,255,255,0.2);
            color: white;
            width: 200px;
        }
        button {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            color: #ffd93d;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🗺️ Generator mapy MC Seed View</h2>
        <p>Wpisz seed swojego serwera i koordynaty, aby otworzyć mapę w nowej karcie.</p>
        
        <input type="text" id="seed" placeholder="Seed (np. 12345)" value="12345">
        <input type="number" id="x" placeholder="X" value="0">
        <input type="number" id="z" placeholder="Z" value="0">
        <button onclick="openMap()">🗺️ Otwórz mapę</button>
        
        <div id="linkContainer"></div>
    </div>

    <script>
        function openMap() {
            let seed = document.getElementById('seed').value;
            let x = document.getElementById('x').value;
            let z = document.getElementById('z').value;
            
            if (!seed) seed = '12345';
            
            // Link do MC Seed View z parametrami
            let url = `https://mcseedview.com/?seed=${encodeURIComponent(seed)}&x=${x}&z=${z}`;
            
            // Otwórz w nowej karcie
            window.open(url, '_blank');
        }
    </script>
</body>
</html>

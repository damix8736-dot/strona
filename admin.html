<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Admin - OdpalamyCheaterow</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* WSZYSTKIE STYLE TAKIE SAME JAK WCZEŚNIEJ */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#f8f9fa;overflow-x:hidden;position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(circle at 20% 50%,rgba(120,119,198,.3) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,119,198,.3) 0%,transparent 50%);}
        .admin-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;width:100%;}
        .admin-section{width:100%;max-width:700px;display:none;}
        .admin-section.active{display:block;animation:fadeInUp 0.5s ease-out;}
        .admin-card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border-radius:25px;padding:3rem;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 50px rgba(0,0,0,.3);}
        .admin-card h1{font-family:'Orbitron',monospace;font-size:2.5rem;text-align:center;margin-bottom:0.5rem;background:linear-gradient(45deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .admin-card > p{text-align:center;margin-bottom:2rem;color:#4ecdc4;font-size:1.1rem;}
        .admin-form{display:flex;flex-direction:column;gap:1.5rem;max-width:400px;margin:0 auto;width:100%;}
        .form-group{display:flex;flex-direction:column;text-align:left;}
        .form-group label{margin-bottom:.5rem;font-weight:500;color:#4ecdc4;}
        .form-group input{padding:1rem;border:2px solid rgba(255,255,255,.2);border-radius:15px;background:rgba(255,255,255,.1);color:#f8f9fa;font-size:1rem;transition:all .3s;text-align:center;}
        .form-group input:focus{outline:none;border-color:#ff6b6b;box-shadow:0 0 20px rgba(255,107,107,.3);}
        .btn-admin-glow{position:relative;padding:1.2rem 3rem;background:linear-gradient(135deg,#ff6b6b 0%,#ffd93d 50%,#ff6b6b 100%);border:none;border-radius:50px;font-size:1.2rem;font-weight:700;color:white;cursor:pointer;overflow:hidden;box-shadow:0 10px 30px rgba(255,107,107,0.4),0 0 0 1px rgba(255,255,255,0.2);transition:all 0.4s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;gap:0.8rem;text-transform:uppercase;letter-spacing:1px;margin:0 auto;}
        .btn-admin-glow:hover{transform:translateY(-5px) scale(1.05);}
        .btn-save{background:linear-gradient(45deg,#4ade80,#22c55e);width:100%;font-size:1.2rem;margin-top:2rem;padding:1rem 2rem;border:none;border-radius:25px;font-weight:600;cursor:pointer;color:white;}
        .btn-logout{background:#ef4444;padding:.7rem 1.5rem;border-radius:20px;border:none;color:white;cursor:pointer;}
        .btn-add{background:#4ecdc4;color:white;border:none;padding:1rem 2rem;border-radius:20px;cursor:pointer;margin-top:1rem;width:100%;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
        .admin-tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid rgba(255,255,255,0.2);padding-bottom:0.5rem;justify-content:center;}
        .admin-tab{background:transparent;border:none;padding:0.8rem 1.5rem;font-size:1rem;font-weight:600;color:#f8f9fa;cursor:pointer;border-radius:30px;}
        .admin-tab.active{background:linear-gradient(45deg,#ff6b6b,#ffd93d);color:white;}
        .rule-editor-item,.changelog-editor-item{background:rgba(255,255,255,.05);padding:1.5rem;border-radius:15px;margin-bottom:1rem;}
        .rule-editor-item{border-left:4px solid #ff6b6b;}
        .changelog-editor-item{border-left:4px solid #4ecdc4;}
        .rule-editor-item input,.rule-editor-item textarea,.changelog-editor-item input,.changelog-editor-item textarea{width:100%;margin-bottom:1rem;padding:0.8rem;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#f8f9fa;}
        .rule-editor-item button,.delete-changelog-btn{background:#ef4444;color:white;border:none;padding:0.5rem 1rem;border-radius:10px;cursor:pointer;}
        .hint{text-align:center;margin-top:1rem;color:#ffd93d;}
        .success{text-align:center;color:#4ade80;margin-top:1rem;}
        .loading{text-align:center;padding:2rem;color:#4ecdc4;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
        @media(max-width:768px){.admin-card{padding:2rem 1.5rem;}}
    </style>
</head>
<body>
    <div id="particles"></div>
    
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="admin-section active">
    <div class="admin-card">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
            <button id="exitBtn" class="btn-exit" style="background: #6c757d; padding: 0.5rem 1rem; border: none; border-radius: 20px; color: white; cursor: pointer; font-size: 0.9rem; transition: all 0.3s;">
                🚪 Wyjście
            </button>
        </div>
        <h1>🔧 Panel Administratora</h1>
        <p>Edytuj regulamin i changelog serwera</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>👤 Login</label>
                <input type="text" id="username" placeholder="damixsigmaprime" required>
            </div>
            <div class="form-group">
                <label>🔑 Hasło</label>
                <input type="password" id="password" placeholder="kupadupa123" required>
            </div>
            <button type="submit" class="btn-admin-glow">🔐 ZALOGUJ SIĘ</button>
        </form>
        
        <div class="hint">💡 Demo: <strong>damixsigmaprime</strong> / <strong>kupadupa123</strong></div>
    </div>
</div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="admin-section">
        <div class="admin-card">
            <div class="admin-header">
                <h1>✅ Zalogowany!</h1>
                <button id="logoutBtn" class="btn-logout">❌ Wyloguj</button>
            </div>
            <div class="admin-tabs">
                <button id="tabRulesBtn" class="admin-tab active">📜 Regulamin</button>
                <button id="tabChangelogBtn" class="admin-tab">📋 Changelog</button>
            </div>
            <div id="rulesEditor"><div class="loading">Ładowanie regulaminu...</div></div>
            <div id="changelogEditor" style="display: none;">
                <div id="changelogList"><div class="loading">Ładowanie changelogu...</div></div>
                <button id="addChangelogBtn" class="btn-add">➕ Dodaj wpis</button>
            </div>
            <button id="saveRulesBtn" class="btn-save">💾 ZAPISZ</button>
            <div id="saveMessage" class="success" style="display:none;">✅ Zapisano!</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // 🔥 WKLEJ SWOJE DANE Z FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBaUPUZ6wuqUcP-k2Er2O_WYIaso1ax600",      // <- WKLEJ SWOJE
            authDomain: "odpalamycheaterow-95883.firebaseapp.com",
            databaseURL: "https://odpalamycheaterow-95883-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "odpalamycheaterow-95883",
            storageBucket: "odpalamycheaterow-95883.firebasestorage.app",
            messagingSenderId: "62453986470",
            appId: "1:62453986470:web:7a2d93c5cf582980ed3067"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        window.db = database;
    </script>
    
    <script>
        const ADMIN_CREDENTIALS = { username: 'damixsigmaprime', password: 'kupadupa123' };
        let currentRules = [], currentChangelog = [];
        
        const loginSection = document.getElementById('loginSection');
        const adminPanel = document.getElementById('adminPanel');
        const loginForm = document.getElementById('loginForm');
        const rulesEditor = document.getElementById('rulesEditor');
        const saveMessage = document.getElementById('saveMessage');
        const tabRulesBtn = document.getElementById('tabRulesBtn');
        const tabChangelogBtn = document.getElementById('tabChangelogBtn');
        const changelogEditorDiv = document.getElementById('changelogEditor');
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function loadDataFromFirebase() {
            try {
                const rulesSnap = await window.db.ref('rules').once('value');
                const changelogSnap = await window.db.ref('changelog').once('value');
                currentRules = rulesSnap.val() || [];
                currentChangelog = changelogSnap.val() || [];
                return true;
            } catch (error) {
                console.error('Błąd:', error);
                return false;
            }
        }
        
        async function saveDataToFirebase() {
            try {
                await window.db.ref('rules').set(currentRules);
                await window.db.ref('changelog').set(currentChangelog);
                return true;
            } catch (error) {
                console.error('Błąd zapisu:', error);
                return false;
            }
        }
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                await loadDataFromFirebase();
                loginSection.classList.remove('active');
                adminPanel.classList.add('active');
                renderRules();
                renderChangelogAdmin();
            } else {
                alert('❌ BŁĄD!\nLogin: damixsigmaprime\nHasło: kupadupa123');
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', function() {
            loginSection.classList.add('active');
            adminPanel.classList.remove('active');
            loginForm.reset();
        });
        
        function renderRules() {
            if (!currentRules.length) {
                rulesEditor.innerHTML = '<div class="loading">Brak regulaminu. Dodaj pierwszą regułę!</div>';
                return;
            }
            let html = '';
            currentRules.forEach((rule, index) => {
                html += `
                    <div class="rule-editor-item">
                        <input type="text" value="${escapeHtml(rule.title)}" placeholder="Tytuł">
                        <textarea placeholder="Opis">${escapeHtml(rule.description)}</textarea>
                        <button onclick="deleteRule(${index})">🗑️ Usuń</button>
                    </div>
                `;
            });
            html += '<button class="btn-add" onclick="addRule()">➕ Dodaj regułę</button>';
            rulesEditor.innerHTML = html;
        }
        
        window.addRule = function() {
            currentRules.push({title: '', description: ''});
            renderRules();
        };
        
        window.deleteRule = function(index) {
            currentRules.splice(index, 1);
            renderRules();
        };
        
        function renderChangelogAdmin() {
            if (!currentChangelog.length) {
                document.getElementById('changelogList').innerHTML = '<div class="loading">Brak wpisów. Dodaj pierwszy wpis!</div>';
                return;
            }
            let html = '';
            currentChangelog.forEach((item, index) => {
                html += `
                    <div class="changelog-editor-item">
                        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                            <input type="text" value="${escapeHtml(item.version)}" placeholder="Wersja" style="flex: 1;">
                            <input type="date" value="${item.date}" style="flex: 1;">
                        </div>
                        <textarea placeholder="Treść" rows="4">${escapeHtml(item.content)}</textarea>
                        <button class="delete-changelog-btn" onclick="deleteChangelogItem(${index})">🗑️ Usuń</button>
                    </div>
                `;
            });
            document.getElementById('changelogList').innerHTML = html;
        }
        
        window.deleteChangelogItem = function(index) {
            currentChangelog.splice(index, 1);
            renderChangelogAdmin();
        };
        
        document.getElementById('addChangelogBtn').addEventListener('click', function() {
            const today = new Date().toISOString().split('T')[0];
            currentChangelog.push({version: 'v1.2.0', date: today, content: 'Nowa aktualizacja!\n- Dodano nowe funkcje'});
            renderChangelogAdmin();
        });
        
        document.getElementById('saveRulesBtn').addEventListener('click', async function() {
            const ruleItems = rulesEditor.querySelectorAll('.rule-editor-item');
            const newRules = [];
            ruleItems.forEach((item) => {
                const title = item.querySelector('input').value.trim();
                const desc = item.querySelector('textarea').value.trim();
                if (title) newRules.push({title, description: desc});
            });
            currentRules = newRules;
            
            const changelogItems = document.querySelectorAll('.changelog-editor-item');
            const newChangelog = [];
            changelogItems.forEach((item) => {
                const version = item.querySelector('input[type="text"]').value.trim();
                const date = item.querySelector('input[type="date"]').value;
                const content = item.querySelector('textarea').value.trim();
                if (version && content) newChangelog.push({version, date, content});
            });
            currentChangelog = newChangelog;
            
            const success = await saveDataToFirebase();
            if (success) {
                saveMessage.style.display = 'block';
                setTimeout(() => saveMessage.style.display = 'none', 3000);
            } else {
                alert('❌ Błąd zapisu!');
            }
        });
        
        tabRulesBtn.addEventListener('click', () => {
            tabRulesBtn.classList.add('active');
            tabChangelogBtn.classList.remove('active');
            rulesEditor.style.display = 'block';
            changelogEditorDiv.style.display = 'none';
            document.getElementById('saveRulesBtn').style.display = 'block';
        });
        
        tabChangelogBtn.addEventListener('click', () => {
            tabChangelogBtn.classList.add('active');
            tabRulesBtn.classList.remove('active');
            rulesEditor.style.display = 'none';
            changelogEditorDiv.style.display = 'block';
            document.getElementById('saveRulesBtn').style.display = 'block';
            renderChangelogAdmin();
        });
        
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:fixed;width:3px;height:3px;background:rgba(255,107,107,.4);border-radius:50%;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:float ${2+Math.random()*3}s infinite;z-index:-1;`;
            document.getElementById('particles').appendChild(p);
        }
    </script>
</body>
</html>


<script>
    // Przycisk wyjścia
    const exitBtn = document.getElementById('exitBtn');
    if (exitBtn) {
        exitBtn.onclick = function() {
            window.location.href = 'index.html';
        };
    } else {
        console.log('Przycisk exitBtn nie został znaleziony');
    }
</script>
